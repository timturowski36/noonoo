modules:
  - id: bundesliga_1
    type: football
    enabled: true
    source: openligadb
    config:
      league: bl1
      season: 2024
    schedule:
      fetchIntervalMinutes: 15
    outputs:
      # Tabellenübersicht – täglich um 18:00
      - type: discord
        channel: sport
        schedule: DAILY_18_00
        format: table_summary
        params:
          leagueName: "1. Bundesliga"

      # Spieltagsergebnisse – montags um 09:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: weekend_summary
        params:
          leagueName: "1. Bundesliga"

      # Letzte Spiele – mehrere Teams, täglich um 08:30
      - type: discord
        channel: sport
        schedule: DAILY_08_30
        format: team_last_matches
        teams:
          - "Borussia Dortmund"
          - "FC Bayern München"
        params:
          limit: "5"
          leagueName: "1. Bundesliga"

      # Nächste Spiele – mehrere Teams, täglich um 07:30
      - type: discord
        channel: sport
        schedule: DAILY_07_30
        format: team_next_matches
        teams:
          - "Borussia Dortmund"
          - "FC Bayern München"
        params:
          limit: "3"
          leagueName: "1. Bundesliga"

      # Team-Zusammenfassung – montags um 10:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_10_00
        format: team_summary
        teams:
          - "Borussia Dortmund"
        params:
          leagueName: "1. Bundesliga"

      # Torjäger eines Teams – montags um 10:30
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_10_30
        format: team_top_scorers
        teams:
          - "Borussia Dortmund"
        params:
          limit: "5"
          leagueName: "1. Bundesliga"

      # Liga-Torjägerliste – montags um 11:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_11_00
        format: league_top_scorers
        params:
          limit: "10"
          leagueName: "1. Bundesliga"

      # Nächster Spieltag – freitags um 12:00
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_00
        format: next_matchday
        params:
          leagueName: "1. Bundesliga"

      # Spieltag-Vorschau – freitags um 12:30
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_30
        format: matchday_preview
        params:
          leagueName: "1. Bundesliga"

  - id: bundesliga_2
    type: football
    enabled: false     # Deaktiviert – auf true setzen zum Aktivieren
    source: openligadb
    config:
      league: bl2
      season: 2024
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: weekend_summary
        params:
          leagueName: "2. Bundesliga"

outputs:
  discord:
    channels:
      sport: ${DISCORD_SPORT_WEBHOOK}
      news: ${DISCORD_NEWS_WEBHOOK}

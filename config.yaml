modules:
  - id: bundesliga_1
    type: football
    enabled: true
    source: openligadb
    config:
      league: bl1
      season: 2024
    schedule:
      fetchIntervalMinutes: 15
    outputs:
      # Tabellenübersicht – täglich um 18:00
      - type: discord
        channel: sport
        schedule: DAILY_18_00
        format: table_summary
        params:
          leagueName: "1. Bundesliga"

      # Spieltagsergebnisse – montags um 09:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: weekend_summary
        params:
          leagueName: "1. Bundesliga"

      # Letzte Spiele – mehrere Teams, täglich um 08:30
      - type: discord
        channel: sport
        schedule: DAILY_08_30
        format: team_last_matches
        teams:
          - "Borussia Dortmund"
          - "FC Bayern München"
        params:
          limit: "5"
          leagueName: "1. Bundesliga"

      # Nächste Spiele – mehrere Teams, täglich um 07:30
      - type: discord
        channel: sport
        schedule: DAILY_07_30
        format: team_next_matches
        teams:
          - "Borussia Dortmund"
          - "FC Bayern München"
        params:
          limit: "3"
          leagueName: "1. Bundesliga"

      # Team-Zusammenfassung – montags um 10:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_10_00
        format: team_summary
        teams:
          - "Borussia Dortmund"
        params:
          leagueName: "1. Bundesliga"

      # Torjäger eines Teams – montags um 10:30
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_10_30
        format: team_top_scorers
        teams:
          - "Borussia Dortmund"
        params:
          limit: "5"
          leagueName: "1. Bundesliga"

      # Liga-Torjägerliste – montags um 11:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_11_00
        format: league_top_scorers
        params:
          limit: "10"
          leagueName: "1. Bundesliga"

      # Nächster Spieltag – freitags um 12:00
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_00
        format: next_matchday
        params:
          leagueName: "1. Bundesliga"

      # Spieltag-Vorschau – freitags um 12:30
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_30
        format: matchday_preview
        params:
          leagueName: "1. Bundesliga"

  - id: heise_tech
    type: news
    enabled: true
    source: rss
    config:
      url: "https://www.heise.de/rss/heise-atom.xml"
      sourceName: "Heise Online"
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      - type: discord
        channel: news
        schedule: DAILY_08_00
        format: news_compact
        params:
          limit: "5"
          keywords: "KI,GPU,Linux,Windows,Sicherheit"

  - id: tagesschau
    type: news
    enabled: true
    source: rss
    config:
      url: "https://www.tagesschau.de/xml/rss2/"
      sourceName: "Tagesschau"
    schedule:
      fetchIntervalMinutes: 30
    outputs:
      - type: discord
        channel: news
        schedule: DAILY_07_00
        format: news_compact
        params:
          limit: "5"

  - id: pubg_friends
    type: pubg
    enabled: false     # PUBG_API_KEY in .env setzen, Spielernamen eintragen und auf true ändern
    source: pubg_api
    config:
      platform: steam  # steam | xbox | psn
    players:
      - "PlayerName1"
      - "PlayerName2"
    schedule:
      fetchIntervalMinutes: 30
    outputs:
      # Tagesstatistik – täglich um 09:00
      - type: discord
        channel: gaming
        schedule: DAILY_09_00
        format: pubg_daily_stats

      # Wochenstatistik – montags um 09:00
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_09_00
        format: pubg_weekly_stats

      # Wochenranking – montags um 09:15
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_09_15
        format: pubg_weekly_ranking

      # Wochenvergleich – montags um 09:30
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_09_30
        format: pubg_weekly_progress

      # Persönliche Rekorde – montags um 10:00
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_10_00
        format: pubg_records

      # Letzte Matches – montags um 10:15
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_10_15
        format: pubg_recent_matches
        params:
          limit: "5"

      # Map-Statistiken – montags um 10:30
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_10_30
        format: pubg_map_stats


  - id: bundesliga_2
    type: football
    enabled: false     # Deaktiviert – auf true setzen zum Aktivieren
    source: openligadb
    config:
      league: bl2
      season: 2024
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: weekend_summary
        params:
          leagueName: "2. Bundesliga"

  # Handball — beliebig viele Teams möglich, jedes als eigenes Modul
  # teamId aus der handball.net-URL ablesen: handball4all.{verband}.{numericId}
  - id: handball_mein_team
    type: handball
    enabled: false    # teamId + Teamnamen eintragen und auf true setzen
    source: handball_api
    config:
      teamId: "handball4all.westfalen.1309001"
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      # Ligatabelle — montags um 09:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: handball_table
        teams:
          - "HSG RE/OE"
        params:
          leagueName: "Bezirksliga Ruhrgebiet"

      # Letzte Spiele — montags um 09:05
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_05
        format: handball_last_matches
        teams:
          - "HSG RE/OE"
        params:
          limit: "5"

      # Nächste Spiele — freitags um 12:00
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_00
        format: handball_next_matches
        teams:
          - "HSG RE/OE"
        params:
          limit: "5"

      # Wochenendergebnisse der Liga — montags um 09:10
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_10
        format: handball_weekend_results
        teams:
          - "HSG RE/OE"
        params:
          leagueName: "Bezirksliga Ruhrgebiet"

      # Spielbericht (Liveticker) — samstags um 21:30
      - type: discord
        channel: sport
        schedule: WEEKLY_SATURDAY_21_30
        format: handball_match_report
        teams:
          - "HSG RE/OE"

      # Formtabelle — montags um 09:15
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_15
        format: handball_form_table
        teams:
          - "HSG RE/OE"
        params:
          leagueName: "Bezirksliga Ruhrgebiet"

      # Nächster Spieltag — freitags um 12:05
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_05
        format: handball_next_matchday
        teams:
          - "HSG RE/OE"
        params:
          leagueName: "Bezirksliga Ruhrgebiet"

  - id: formula1_2025
    type: formula1
    enabled: true
    source: jolpica_f1
    config:
      season: "2025"
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      # Letztes Rennen + Fahrerwertung – montags um 09:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: f1_last_race

      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_05
        format: f1_standings

      # Nächstes Rennen + Streckenwinner – donnerstags um 18:00
      - type: discord
        channel: sport
        schedule: WEEKLY_THURSDAY_18_00
        format: f1_next_race

      - type: discord
        channel: sport
        schedule: WEEKLY_THURSDAY_18_05
        format: f1_circuit_history

  - id: handball_zweites_team
    type: handball
    enabled: false
    source: handball_api
    config:
      teamId: "handball4all.westfalen.9999999"  # Eigene ID eintragen
    schedule:
      fetchIntervalMinutes: 60
    outputs: []

  - id: handball_stats_nrw_300268
    type: handball_statistics
    enabled: true
    source: handball_statistics_api
    config:
      leagueId: "300268"
      season: "2526"
    schedule:
      fetchIntervalMinutes: 60
    outputs: []

outputs:
  discord:
    channels:
      sport: ${DISCORD_SPORT_WEBHOOK}
      news: ${DISCORD_NEWS_WEBHOOK}
      gaming: ${DISCORD_GAMING_WEBHOOK}

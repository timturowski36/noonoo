modules:
  - id: bundesliga_1
    type: football
    enabled: true
    source: openligadb
    config:
      league: bl1
      season: 2024
    schedule:
      fetchIntervalMinutes: 15
    outputs:
      # Tabellenübersicht – täglich um 18:00
      - type: discord
        channel: sport
        schedule: DAILY_18_00
        format: table_summary
        params:
          leagueName: "1. Bundesliga"

      # Spieltagsergebnisse – montags um 09:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: weekend_summary
        params:
          leagueName: "1. Bundesliga"

      # Letzte Spiele – mehrere Teams, täglich um 08:30
      - type: discord
        channel: sport
        schedule: DAILY_08_30
        format: team_last_matches
        teams:
          - "Borussia Dortmund"
          - "FC Bayern München"
        params:
          limit: "5"
          leagueName: "1. Bundesliga"

      # Nächste Spiele – mehrere Teams, täglich um 07:30
      - type: discord
        channel: sport
        schedule: DAILY_07_30
        format: team_next_matches
        teams:
          - "Borussia Dortmund"
          - "FC Bayern München"
        params:
          limit: "3"
          leagueName: "1. Bundesliga"

      # Team-Zusammenfassung – montags um 10:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_10_00
        format: team_summary
        teams:
          - "Borussia Dortmund"
        params:
          leagueName: "1. Bundesliga"

      # Torjäger eines Teams – montags um 10:30
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_10_30
        format: team_top_scorers
        teams:
          - "Borussia Dortmund"
        params:
          limit: "5"
          leagueName: "1. Bundesliga"

      # Liga-Torjägerliste – montags um 11:00
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_11_00
        format: league_top_scorers
        params:
          limit: "10"
          leagueName: "1. Bundesliga"

      # Nächster Spieltag – freitags um 12:00
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_00
        format: next_matchday
        params:
          leagueName: "1. Bundesliga"

      # Spieltag-Vorschau – freitags um 12:30
      - type: discord
        channel: sport
        schedule: WEEKLY_FRIDAY_12_30
        format: matchday_preview
        params:
          leagueName: "1. Bundesliga"

  - id: heise_tech
    type: news
    enabled: true
    source: rss
    config:
      url: "https://www.heise.de/rss/heise-atom.xml"
      sourceName: "Heise Online"
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      - type: discord
        channel: news
        schedule: DAILY_08_00
        format: news_compact
        params:
          limit: "5"
          keywords: "KI,GPU,Linux,Windows,Sicherheit"

  - id: tagesschau
    type: news
    enabled: true
    source: rss
    config:
      url: "https://www.tagesschau.de/xml/rss2/"
      sourceName: "Tagesschau"
    schedule:
      fetchIntervalMinutes: 30
    outputs:
      - type: discord
        channel: news
        schedule: DAILY_07_00
        format: news_compact
        params:
          limit: "5"

  - id: pubg_friends
    type: pubg
    enabled: false     # PUBG_API_KEY in .env setzen, Spielernamen eintragen und auf true ändern
    source: pubg_api
    config:
      platform: steam  # steam | xbox | psn
    players:
      - "PlayerName1"
      - "PlayerName2"
    schedule:
      fetchIntervalMinutes: 30
    outputs:
      # Tagesstatistik – täglich um 09:00
      - type: discord
        channel: gaming
        schedule: DAILY_09_00
        format: pubg_daily_stats

      # Wochenstatistik – montags um 09:00
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_09_00
        format: pubg_weekly_stats

      # Wochenranking – montags um 09:15
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_09_15
        format: pubg_weekly_ranking

      # Wochenvergleich – montags um 09:30
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_09_30
        format: pubg_weekly_progress

      # Persönliche Rekorde – montags um 10:00
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_10_00
        format: pubg_records

      # Letzte Matches – montags um 10:15
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_10_15
        format: pubg_recent_matches
        params:
          limit: "5"

      # Map-Statistiken – montags um 10:30
      - type: discord
        channel: gaming
        schedule: WEEKLY_MONDAY_10_30
        format: pubg_map_stats


  - id: bundesliga_2
    type: football
    enabled: false     # Deaktiviert – auf true setzen zum Aktivieren
    source: openligadb
    config:
      league: bl2
      season: 2024
    schedule:
      fetchIntervalMinutes: 60
    outputs:
      - type: discord
        channel: sport
        schedule: WEEKLY_MONDAY_09_00
        format: weekend_summary
        params:
          leagueName: "2. Bundesliga"

outputs:
  discord:
    channels:
      sport: ${DISCORD_SPORT_WEBHOOK}
      news: ${DISCORD_NEWS_WEBHOOK}
      gaming: ${DISCORD_GAMING_WEBHOOK}

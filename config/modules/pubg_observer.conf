# ═══════════════════════════════════════════════════════════════
# PUBG Observer Konfiguration
# ═══════════════════════════════════════════════════════════════
#
# players          - Kommagetrennte Liste der Spielernamen
# platform         - steam | psn | xbox | kakao
# channel          - Discord-Channel (muss in .env konfiguriert sein)
# check_interval   - Wie oft geprüft wird ob jemand spielt (Minuten)
# stats_interval   - Wie oft Stats gesendet werden wenn aktiv (Minuten)
# activity_window  - Spieler gilt als aktiv wenn letztes Match < X Min her
#
# ═══════════════════════════════════════════════════════════════

players         = brotrustgaming, philipnc, chrissi1970
platform        = steam
channel         = allgemein
check_interval  = 5
stats_interval  = 30
activity_window = 90

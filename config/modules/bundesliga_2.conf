# ═══════════════════════════════════════════════════════════════
# 2. Bundesliga Modul Konfiguration
# ═══════════════════════════════════════════════════════════════
#
# liga             - bl1 = 1. Bundesliga | bl2 = 2. Bundesliga
# lieblingsverein  - Wird in der Tabelle hervorgehoben (Teilstring reicht)
# channel          - Discord-Channel (muss in .env konfiguriert sein)
# hour             - Uhrzeit: 19 = 19:xx Uhr, 21 = 21:xx Uhr (Sa/So-Regel)
# minute_offset    - Minuten innerhalb der Stunde (0-59)
# even_hours_only  - Nur zu geraden Stunden (true/false) — wird ignoriert wenn hour gesetzt
# odd_hours_only   - Nur zu ungeraden Stunden (true/false) — wird ignoriert wenn hour gesetzt
# days             - mo, di, mi, do, fr, sa, so (kommagetrennt) | leer = täglich
#
# ═══════════════════════════════════════════════════════════════

liga            = bl2
lieblingsverein = Schalke
channel         = sportnews
hour            = 19
minute_offset   = 2
even_hours_only = false
odd_hours_only  = false
days            = mo, fr, sa, so

# ═══════════════════════════════════════════════════════════════
# 1. Bundesliga Modul Konfiguration
# ═══════════════════════════════════════════════════════════════
#
# liga             - bl1 = 1. Bundesliga | bl2 = 2. Bundesliga
# lieblingsverein  - Wird in der Tabelle hervorgehoben (Teilstring reicht)
# channel          - Discord-Channel (muss in .env konfiguriert sein)
# minute_offset    - Zu welcher Minute der Stunde das Modul läuft (0-59)
# even_hours_only  - Nur zu geraden Stunden (true/false)
# odd_hours_only   - Nur zu ungeraden Stunden (true/false)
#
# ═══════════════════════════════════════════════════════════════

liga            = bl1
lieblingsverein = Schalke
channel         = allgemein
minute_offset   = 15
even_hours_only = true
odd_hours_only  = false

# Wochentage: mo, di, mi, do, fr, sa, so (kommagetrennt) oder leer = täglich
days            = mo
